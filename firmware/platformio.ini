;
; Standalone PlatformIO project for the sargassum drifter training firmware. Builds ONLY the WiFi-direct
; sargassum sketch (no LoRa/mesh). Board: LilyGo T-Beam Supreme (ESP32-S3, 8MB flash / 8MB PSRAM) -- the
; board definition is shipped in boards/t_beams3_supreme.json so this builds from the repo alone.
;
; Build:  pio run
; Flash:  provide your WiFi + server config at build time (never commit real values), then upload, e.g.
;   PLATFORMIO_BUILD_FLAGS="-DWIFI_SSID='\"myssid\"' -DWIFI_PASS='\"mypass\"' \
;     -DSARG_URL='\"https://your-server.example\"' -DSARG_TOKEN='\"your-token\"' -DSARG_DRIFTER='\"drifter1\"'" \
;     pio run -t upload
[platformio]
boards_dir = boards
src_dir = sargassum_wifi

[env:sargassum_wifi]
platform = platformio/espressif32@6.11.0
board = t_beams3_supreme
framework = arduino
monitor_speed = 115200
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_src_filter = -<*> +<main.cpp>
build_flags =
  -I shared
  ; per-deployment placeholders -- override at build (PLATFORMIO_BUILD_FLAGS), never commit real values
  -D WIFI_SSID='"REPLACE_SSID"'
  -D WIFI_PASS='"REPLACE_PASS"'
  -D SARG_URL='"https://your-server.example"'
  -D SARG_TOKEN='"CHANGE_ME"'
  -D SARG_DRIFTER='"drifter1"'
lib_deps =
  lewisxhe/SensorLib @ ^0.4.1
  lewisxhe/XPowersLib @ ^0.2.6
  adafruit/Adafruit SH110X @ ^2.1.13
